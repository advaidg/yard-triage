apiVersion: v1
kind: Namespace
metadata:
  name: yard-triage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: yard-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - image: redis:7-alpine
        name: redis
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: yard-triage
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: orchestrator
    yard-system: yard-triage
  name: orchestrator
  namespace: yard-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        yard-system: yard-triage
    spec:
      containers:
      - env:
        - name: YARD_SYSTEM_ID
          value: c8118977-4cda-44a6-a914-0efc0936a9a9
        - name: YARD_TRANSPORT
          value: http
        - name: YARD_REDIS_URL
          value: redis://redis:6379
        - name: YARD_ENGINE_TYPE
          value: chain_executor
        - name: YARD_OTLP_ENDPOINT
          value: http://jaeger:4318/v1/traces
        image: agentyard-engine:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        name: orchestrator
        ports:
        - containerPort: 8080
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: yard-triage
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: orchestrator
---
