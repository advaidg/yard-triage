version: '3.8'
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
  orchestrator:
    image: agentyard/orchestrator:latest
    ports:
    - 8080:8080
    environment:
      YARD_SYSTEM_ID: c8118977-4cda-44a6-a914-0efc0936a9a9
      YARD_TRANSPORT: http
      YARD_REDIS_URL: redis://redis:6379
      YARD_ENGINE_TYPE: chain_executor
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      redis:
        condition: service_healthy
  triage-classifier:
    image: docker.io/advaidg/agentyard2:triage-classifier-7257a11
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: c8118977-4cda-44a6-a914-0efc0936a9a9
      YARD_NODE_ID: node-94117936
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-94117936
      target: /yard/config.yaml
  triage-sentiment:
    image: docker.io/advaidg/agentyard2:triage-sentiment-69297ae
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: c8118977-4cda-44a6-a914-0efc0936a9a9
      YARD_NODE_ID: node-9712fffa
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-9712fffa
      target: /yard/config.yaml
  triage-responder:
    image: docker.io/advaidg/agentyard2:triage-responder-69297ae
    environment:
      YARD_TRANSPORT: http
      YARD_SYSTEM_ID: c8118977-4cda-44a6-a914-0efc0936a9a9
      YARD_NODE_ID: node-da0a9b68
      YARD_REDIS_URL: redis://redis:6379
      YARD_PORT: '9000'
      YARD_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      YARD_MEMORY: shared_bus
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
    configs:
    - source: yard_cfg_node-da0a9b68
      target: /yard/config.yaml
networks:
  default:
    name: yard-triage
configs:
  yard_cfg_node-94117936:
    file: ./yard-config-node-94117936.yaml
  yard_cfg_node-9712fffa:
    file: ./yard-config-node-9712fffa.yaml
  yard_cfg_node-da0a9b68:
    file: ./yard-config-node-da0a9b68.yaml
